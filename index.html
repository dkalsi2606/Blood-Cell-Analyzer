<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blood Anomaly Detector & Classifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Figtree:ital,wght@0,400;0,500;0,600;1,400&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #080C14;
      --surface: #0F1623;
      --card: #141C2B;
      --border: #1E293B;
      --border2: #2D3A50;
      --tx1: #F0F4FF;
      --tx2: #8896B0;
      --tx3: #4A5568;
      --red: #E84040;
      --red-bg: #1A0C0C;
      --red-soft: rgba(232, 64, 64, .12);
      --green: #22C55E;
      --green-bg: #071510;
      --green-soft: rgba(34, 197, 94, .12);
      --amber: #F59E0B;
      --amber-bg: #160F03;
      --amber-soft: rgba(245, 158, 11, .12);
      --blue: #60A5FA;
      --blue-soft: rgba(96, 165, 250, .12);
      --teal: #2DD4BF;
      --purple: #A78BFA;
      --r: 10px;
      --r-sm: 7px;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Figtree', system-ui, sans-serif;
      --display: 'Syne', system-ui, sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--tx1);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 0 0 80px;
    }

    a {
      color: var(--blue);
    }

    /* ── Layout ── */
    .shell {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Header ── */
    .hdr {
      border-bottom: 1px solid var(--border);
      padding: 20px 0 18px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .hdr-icon {
      width: 42px;
      height: 42px;
      border-radius: var(--r-sm);
      background: var(--red-bg);
      border: 1px solid rgba(232, 64, 64, .25);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .hdr-icon svg {
      display: block;
    }

    .hdr-title {
      font-family: var(--display);
      font-size: 19px;
      font-weight: 600;
      color: var(--tx1);
    }

    .hdr-sub {
      font-size: 12px;
      color: var(--tx3);
      margin-top: 2px;
      letter-spacing: .02em;
    }

    /* ── Stepper ── */
    .stepper {
      display: flex;
      align-items: center;
      margin-bottom: 28px;
    }

    .step-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .step-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      transition: all .3s;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--tx3);
    }

    .step-num.done {
      background: var(--tx1);
      color: var(--bg);
      border-color: var(--tx1);
    }

    .step-num.active {
      background: var(--card);
      color: var(--tx1);
      border-color: var(--border2);
    }

    .step-lbl {
      font-size: 11px;
      color: var(--tx3);
      margin-top: 5px;
      transition: color .3s;
    }

    .step-lbl.active,
    .step-lbl.done {
      color: var(--tx2);
    }

    .step-line {
      height: 1px;
      flex: 2;
      margin-bottom: 18px;
      background: var(--border);
      transition: background .3s;
    }

    .step-line.done {
      background: var(--border2);
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px 20px;
      margin-bottom: 12px;
    }

    .card-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--tx3);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }

    .card-label svg {
      opacity: .6;
    }

    /* ── Upload ── */
    .upload-zone {
      border: 1.5px dashed var(--border2);
      border-radius: var(--r);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      background: var(--surface);
      position: relative;
    }

    .upload-zone:hover,
    .upload-zone.drag {
      border-color: var(--blue);
      background: var(--blue-soft);
    }

    .upload-zone svg {
      margin: 0 auto 12px;
      display: block;
    }

    .upload-zone p {
      color: var(--tx2);
      font-size: 14px;
      font-weight: 500;
    }

    .upload-zone small {
      color: var(--tx3);
      font-size: 12px;
      margin-top: 4px;
      display: block;
    }

    input[type=file] {
      display: none;
    }

    .file-preview {
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      padding: 4px 0;
    }

    .file-thumb {
      width: 52px;
      height: 52px;
      border-radius: 7px;
      background: var(--red-bg);
      border: 1px solid rgba(232, 64, 64, .2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .file-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .file-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--tx1);
    }

    .file-meta {
      font-size: 12px;
      color: var(--tx3);
      margin-top: 3px;
    }

    /* ── Button ── */
    .btn-primary {
      width: 100%;
      padding: 11px;
      border-radius: var(--r-sm);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all .2s;
      background: var(--tx1);
      color: var(--bg);
      letter-spacing: .01em;
    }

    .btn-primary:disabled {
      background: var(--surface);
      color: var(--tx3);
      cursor: default;
      border: 1px solid var(--border);
    }

    .btn-primary:not(:disabled):hover {
      opacity: .92;
    }

    /* ── Error ── */
    .error-box {
      background: var(--red-bg);
      border: 1px solid rgba(232, 64, 64, .3);
      border-radius: var(--r-sm);
      padding: 12px 15px;
      color: var(--red);
      font-size: 13px;
      margin-top: 10px;
    }

    /* ── Loader ── */
    .loader {
      text-align: center;
      padding: 32px 0;
    }

    .dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 14px;
    }

    .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--tx2);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dots span:nth-child(2) {
      animation-delay: .2s;
    }

    .dots span:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(.55);
        opacity: .3
      }

      40% {
        transform: scale(1);
        opacity: 1
      }
    }

    .loader p {
      color: var(--tx3);
      font-size: 13px;
    }

    /* ── Results fade-in ── */
    #results {
      animation: fadeUp .45s ease forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    /* ── Risk Banner ── */
    .risk-banner {
      border-radius: var(--r);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      border: 1px solid;
    }

    .risk-banner.low {
      background: var(--green-bg);
      border-color: rgba(34, 197, 94, .2);
    }

    .risk-banner.moderate {
      background: var(--amber-bg);
      border-color: rgba(245, 158, 11, .2);
    }

    .risk-banner.high,
    .risk-banner.critical {
      background: var(--red-bg);
      border-color: rgba(232, 64, 64, .25);
    }

    .risk-level {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .risk-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px;
    }

    .risk-dot.low {
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, .2);
    }

    .risk-dot.moderate {
      background: var(--amber);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, .2);
    }

    .risk-dot.high,
    .risk-dot.critical {
      background: var(--red);
      box-shadow: 0 0 0 3px rgba(232, 64, 64, .2);
    }

    .risk-tag {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--tx3);
    }

    .risk-name {
      font-family: var(--display);
      font-size: 22px;
      font-weight: 700;
    }

    .risk-name.low {
      color: var(--green);
    }

    .risk-name.moderate {
      color: var(--amber);
    }

    .risk-name.high,
    .risk-name.critical {
      color: var(--red);
    }

    /* ── Gauge ── */
    .gauge-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .gauge-label-sm {
      font-size: 11px;
      color: var(--tx3);
    }

    .gauge-status {
      font-size: 12px;
      font-weight: 600;
      margin-top: 2px;
    }

    /* ── Flags ── */
    .flags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .flag-chip {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--amber-soft);
      color: var(--amber);
      border: 1px solid rgba(245, 158, 11, .2);
    }

    /* ── 2-col grid ── */
    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    @media(max-width:540px) {
      .grid2 {
        grid-template-columns: 1fr;
      }
    }

    /* ── Prediction cards ── */
    .pred-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 18px;
    }

    .pred-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .pred-badge.normal {
      background: var(--green-soft);
      color: var(--green);
    }

    .pred-badge.anomaly {
      background: var(--red-soft);
      color: var(--red);
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .conf-track {
      height: 4px;
      border-radius: 2px;
      background: var(--surface);
      margin-top: 10px;
      overflow: hidden;
    }

    .conf-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .7s ease;
    }

    .conf-fill.normal {
      background: var(--green);
    }

    .conf-fill.anomaly {
      background: var(--red);
    }

    .conf-pct {
      font-size: 11px;
      color: var(--tx3);
      margin-top: 4px;
    }

    .pred-reason {
      font-size: 12px;
      color: var(--tx2);
      margin-top: 9px;
      line-height: 1.55;
    }

    /* ── Disease card ── */
    .disease-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 18px;
      margin-bottom: 12px;
    }

    .clinical-note {
      margin-top: 12px;
      padding: 10px 13px;
      background: var(--blue-soft);
      border-left: 3px solid var(--blue);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      font-size: 13px;
      color: var(--tx1);
      line-height: 1.55;
    }

    /* ── CBC values ── */
    .cbc-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 18px;
      margin-bottom: 12px;
    }

    .cbc-row {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .cbc-row:last-of-type {
      border-bottom: none;
    }

    .cbc-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .cbc-name {
      font-size: 13px;
      color: var(--tx2);
    }

    .cbc-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cbc-flag {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 3px;
      font-family: var(--mono);
    }

    .cbc-flag.H {
      background: var(--red-soft);
      color: var(--red);
    }

    .cbc-flag.L {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .cbc-flag.N {
      background: var(--green-soft);
      color: var(--green);
    }

    .cbc-val {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--tx1);
    }

    .cbc-unit {
      font-size: 11px;
      color: var(--tx3);
      margin-left: 3px;
      font-family: var(--sans);
    }

    /* ── Range bar ── */
    .range-track {
      position: relative;
      height: 6px;
      border-radius: 3px;
      background: var(--surface);
      overflow: visible;
    }

    .range-normal {
      position: absolute;
      top: 0;
      height: 100%;
      background: var(--green);
      opacity: .18;
      border-radius: 3px;
    }

    .range-marker {
      position: absolute;
      top: -4px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      transform: translateX(-50%);
      transition: left .65s cubic-bezier(.4, 0, .2, 1);
    }

    .range-marker.N {
      background: var(--green);
      box-shadow: 0 0 0 2px rgba(34, 197, 94, .3);
    }

    .range-marker.H {
      background: var(--red);
      box-shadow: 0 0 0 2px rgba(232, 64, 64, .3);
    }

    .range-marker.L {
      background: var(--blue);
      box-shadow: 0 0 0 2px rgba(96, 165, 250, .3);
    }

    .range-refs {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }

    .range-refs span {
      font-size: 10px;
      color: var(--tx3);
      font-family: var(--mono);
    }

    /* ── Differential ── */
    .diff-bar {
      display: flex;
      height: 14px;
      border-radius: 7px;
      overflow: hidden;
      gap: 1px;
      margin-bottom: 14px;
    }

    .diff-seg {
      transition: flex .6s ease;
      min-width: 2px;
      opacity: .9;
    }

    .diff-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 18px;
    }

    .diff-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .diff-left {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .diff-swatch {
      width: 9px;
      height: 9px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .diff-lbl {
      font-size: 12px;
      color: var(--tx2);
    }

    .diff-pct {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
    }

    .diff-pct.off {
      color: var(--red);
    }

    .diff-pct.ok {
      color: var(--tx1);
    }

    .diff-arrow {
      font-size: 10px;
      margin-left: 2px;
    }

    /* ── Disclaimer ── */
    .disclaimer {
      font-size: 11px;
      color: var(--tx3);
      line-height: 1.6;
      margin-top: 6px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>

<body>
  <script src="config.js"></script>

  <div class="shell">

    <div class="hdr">
      <div class="hdr-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#E84040" stroke-width="2.2">
          <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z" />
          <circle cx="12" cy="9" r="2.5" fill="#E84040" stroke="none" />
        </svg>
      </div>
      <div>
        <div class="hdr-title">Blood Anomaly Detector &amp; Classifier</div>
        <div class="hdr-sub">CytoDiffusion · 19 cell types · AUC 0.990 · Nature Machine Intelligence 2025</div>
      </div>
    </div>

    <div class="stepper" id="stepper">
      <div class="step-item">
        <div class="step-num" id="s1">1</div>
        <div class="step-lbl" id="sl1">Upload</div>
      </div>
      <div class="step-line" id="l1"></div>
      <div class="step-item">
        <div class="step-num" id="s2">2</div>
        <div class="step-lbl" id="sl2">Analyze</div>
      </div>
      <div class="step-line" id="l2"></div>
      <div class="step-item">
        <div class="step-num" id="s3">3</div>
        <div class="step-lbl" id="sl3">Results</div>
      </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()"
        ondragover="evPD(event);this.classList.add('drag')" ondragleave="this.classList.remove('drag')"
        ondrop="dropFile(event)">
        <input type="file" id="fileInput" accept=".pdf,image/png,image/jpeg,image/webp"
          onchange="pickFile(this.files[0])">
        <div id="uploadPrompt">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#4A5568" stroke-width="1.6">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          <p>Drop blood report here, or click to browse</p>
          <small>PDF lab report · PNG · JPG · WEBP</small>
        </div>
        <div id="filePreview" class="file-preview" style="display:none"></div>
      </div>
    </div>

    <button class="btn-primary" id="analyzeBtn" style="display:none;" disabled onclick="analyze()">Analyze Blood
      Report</button>

    <div class="error-box" id="errorBox" style="display:none"></div>

    <div class="loader" id="loader" style="display:none">
      <div class="dots"><span></span><span></span><span></span></div>
      <p>Extracting values &amp; running CytoDiffusion predictions…</p>
    </div>

    <div id="results" style="display:none;margin-top:20px"></div>

  </div>
  <script>
    const SYSTEM = `You are an advanced hematology AI analyzing blood test reports with the CytoDiffusion model (Nature Machine Intelligence 2025). 19 cell types (7 normal, 12 abnormal), AUC 0.990.

NORMAL: Neutrophil, Lymphocyte, Monocyte, Eosinophil, Basophil, Erythrocyte, Platelet
ABNORMAL: Blast_Cell, Hypersegmented_Neutrophil, Atypical_Lymphocyte, Reactive_Lymphocyte, Promyelocyte, Myelocyte, Metamyelocyte, Band_Neutrophil, Sickle_Cell, Target_Cell, Elliptocyte, Schistocyte, Giant_Platelet
Disease: Normal_WBC, Normal_RBC, Normal_Platelet, Leukemia, Anemia, Infection, Sickle_Cell, Artefact

Normal CBC: WBC 4000-11000/uL, RBC 4.1-5.9 M/uL, Hgb 12.0-17.5 g/dL, Hct 36-53%, Plt 150000-400000/uL, MCV 80-100 fL, MCHC 32-36 g/dL, Neut 50-70%, Lymph 20-40%, Mono 2-8%, Eos 1-4%, Baso 0-1%

Anomaly signals: eccentricity spike -> sickle/elliptocytes; lobularity >5 -> hyperseg neutrophil; low chromatin density -> blast; cytodiffusion_score >0.5 -> anomalous.

Return ONLY valid JSON, nothing else:
{"extracted_values":{"wbc_count_per_ul":null,"rbc_count_millions_per_ul":null,"hemoglobin_g_dl":null,"hematocrit_pct":null,"platelet_count_per_ul":null,"mcv_fl":null,"mchc_g_dl":null,"neutrophils_pct":null,"lymphocytes_pct":null,"monocytes_pct":null,"eosinophils_pct":null,"basophils_pct":null},"anomaly_detection":{"label":"Normal or Anomaly","confidence":0.0,"cytodiffusion_score":0.0,"reasoning":""},"cell_type_classification":{"primary_type":"","confidence":0.0,"secondary_types":[],"reasoning":""},"disease_classification":{"category":"","confidence":0.0,"reasoning":"","clinical_notes":""},"overall_risk":"Low or Moderate or High or Critical","key_flags":[]}`;

    const CBC_META = {
      wbc_count_per_ul: { label: 'WBC', unit: '/µL', lo: 0, hi: 20000, nLo: 4000, nHi: 11000, fmt: v => v > 999 ? v.toLocaleString() : v.toFixed(0) },
      rbc_count_millions_per_ul: { label: 'RBC', unit: 'M/µL', lo: 2, hi: 9, nLo: 4.1, nHi: 5.9, fmt: v => v.toFixed(2) },
      hemoglobin_g_dl: { label: 'Hemoglobin', unit: 'g/dL', lo: 4, hi: 22, nLo: 12.0, nHi: 17.5, fmt: v => v.toFixed(1) },
      hematocrit_pct: { label: 'Hematocrit', unit: '%', lo: 15, hi: 65, nLo: 36, nHi: 53, fmt: v => v.toFixed(1) },
      platelet_count_per_ul: { label: 'Platelets', unit: '/µL', lo: 0, hi: 700000, nLo: 150000, nHi: 400000, fmt: v => v.toLocaleString() },
      mcv_fl: { label: 'MCV', unit: 'fL', lo: 55, hi: 130, nLo: 80, nHi: 100, fmt: v => v.toFixed(0) },
      mchc_g_dl: { label: 'MCHC', unit: 'g/dL', lo: 24, hi: 42, nLo: 32, nHi: 36, fmt: v => v.toFixed(1) },
    };

    const DIFF_META = {
      neutrophils_pct: { label: 'Neutrophils', color: '#3B82F6', nLo: 50, nHi: 70 },
      lymphocytes_pct: { label: 'Lymphocytes', color: '#A78BFA', nLo: 20, nHi: 40 },
      monocytes_pct: { label: 'Monocytes', color: '#F59E0B', nLo: 2, nHi: 8 },
      eosinophils_pct: { label: 'Eosinophils', color: '#2DD4BF', nLo: 1, nHi: 4 },
      basophils_pct: { label: 'Basophils', color: '#F87171', nLo: 0, nHi: 1 },
    };

    const NORMAL_CELLS = new Set(['Neutrophil', 'Lymphocyte', 'Monocyte', 'Eosinophil', 'Basophil', 'Erythrocyte', 'Platelet']);
    const NORMAL_DIS = new Set(['Normal_WBC', 'Normal_RBC', 'Normal_Platelet']);

    let fileData = null, fileType = null, fileName = null, fileSize = 0;

    function evPD(e) { e.preventDefault(); }

    function setStep(n) {
      [1, 2, 3].forEach(i => {
        const el = document.getElementById('s' + i), ll = document.getElementById('sl' + i);
        el.className = 'step-num' + (i < n ? ' done' : i === n ? ' active' : '');
        ll.className = 'step-lbl' + (i <= n ? ' active' : '');
        if (i < 3) document.getElementById('l' + i).className = 'step-line' + (i < n ? ' done' : '');
      });
    }

    function pickFile(f) {
      if (!f) return;
      const ok = ['application/pdf', 'image/png', 'image/jpeg', 'image/jpg', 'image/webp'];
      if (!ok.includes(f.type)) { showError('Please upload a PDF or image (PNG, JPG, WEBP).'); return; }
      fileName = f.name; fileType = f.type; fileSize = f.size;
      const reader = new FileReader();
      reader.onload = e => {
        fileData = e.target.result.split(',')[1];
        renderFilePreview(f, e.target.result);
        document.getElementById('errorBox').style.display = 'none';
        document.getElementById('results').style.display = 'none';
        setStep(1);

        // Automatically trigger the analysis process here
        analyze();
      };
      reader.readAsDataURL(f);
    }

    function dropFile(e) {
      e.preventDefault();
      document.getElementById('uploadZone').classList.remove('drag');
      if (e.dataTransfer.files[0]) pickFile(e.dataTransfer.files[0]);
    }

    function renderFilePreview(f, dataUrl) {
      const prompt = document.getElementById('uploadPrompt');
      const preview = document.getElementById('filePreview');
      prompt.style.display = 'none'; preview.style.display = 'flex';
      const isPdf = f.type === 'application/pdf';
      preview.innerHTML = `
    <div class="file-thumb">
      ${isPdf
          ? `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E84040" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`
          : `<img src="${dataUrl}" alt="">`}
    </div>
    <div>
      <div class="file-name">${f.name}</div>
      <div class="file-meta">${(f.size / 1024).toFixed(1)} KB &middot; ${isPdf ? 'PDF' : 'Image'}</div>
      <div class="file-meta" style="color:#3A4A60;margin-top:2px">Click to change</div>
    </div>`;
    }

    function showError(msg) {
      const b = document.getElementById('errorBox');
      b.textContent = msg; b.style.display = 'block';
    }

    function pct(v, lo, hi, nLo, nHi) {
      const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
      return ((clamp(v, lo, hi) - lo) / (hi - lo)) * 100;
    }

    function flag(v, nLo, nHi) { return v < nLo ? 'L' : v > nHi ? 'H' : 'N'; }

    function buildGauge(score) {
      const r = 30, c = 2 * Math.PI * r, dash = (score * c).toFixed(2);
      const col = score > .7 ? '#E84040' : score > .4 ? '#F59E0B' : '#22C55E';
      const status = score > .7 ? 'Highly anomalous' : score > .4 ? 'Borderline' : 'Normal range';
      return `
  <div class="gauge-wrap">
    <svg width="76" height="76" viewBox="0 0 76 76">
      <circle cx="38" cy="38" r="${r}" fill="none" stroke="#1E293B" stroke-width="7"/>
      <circle cx="38" cy="38" r="${r}" fill="none" stroke="${col}" stroke-width="7"
        stroke-dasharray="${dash} ${c}" stroke-linecap="round" transform="rotate(-90 38 38)"
        style="transition:stroke-dasharray .8s ease"/>
      <text x="38" y="43" text-anchor="middle" font-size="15" font-weight="600"
        fill="#F0F4FF" font-family="IBM Plex Mono,monospace">${Math.round(score * 100)}</text>
    </svg>
    <div>
      <div class="gauge-label-sm">CytoDiffusion score</div>
      <div class="gauge-status" style="color:${col}">${status}</div>
    </div>
  </div>`;
    }

    function buildRangeBar(val, lo, hi, nLo, nHi, fmt) {
      const f = flag(val, nLo, nHi);
      const valPct = pct(val, lo, hi, nLo, nHi);
      const nLoPct = pct(nLo, lo, hi, nLo, nHi);
      const nHiPct = pct(nHi, lo, hi, nLo, nHi);
      return `
  <div class="range-track">
    <div class="range-normal" style="left:${nLoPct}%;width:${nHiPct - nLoPct}%"></div>
    <div class="range-marker ${f}" style="left:${valPct}%"></div>
  </div>
  <div class="range-refs">
    <span>${fmt(nLo)}</span>
    <span>reference range</span>
    <span>${fmt(nHi)}</span>
  </div>`;
    }

    function buildResults(r) {
      const ev = r.extracted_values || {};
      const ad = r.anomaly_detection || {};
      const ct = r.cell_type_classification || {};
      const dc = r.disease_classification || {};
      const risk = (r.overall_risk || 'Low').toLowerCase();
      const riskClass = risk === 'critical' ? 'critical' : risk;
      const isAnomalyOk = ad.label === 'Normal';
      const isCellOk = NORMAL_CELLS.has(ct.primary_type);
      const isDisOk = NORMAL_DIS.has(dc.category);
      const adClass = isAnomalyOk ? 'normal' : 'anomaly';
      const ctClass = isCellOk ? 'normal' : 'anomaly';
      const diClass = isDisOk ? 'normal' : 'anomaly';
      const adConf = Math.round((ad.confidence || 0) * 100);
      const ctConf = Math.round((ct.confidence || 0) * 100);
      const diConf = Math.round((dc.confidence || 0) * 100);

      // Flags
      const flagsHtml = r.key_flags?.length
        ? `<div class="flags">${r.key_flags.map(f => `<span class="flag-chip">${f}</span>`).join('')}</div>` : '';

      // Gauge
      const gaugeHtml = ad.cytodiffusion_score != null ? buildGauge(ad.cytodiffusion_score) : '';

      // Risk banner
      const riskBanner = `
  <div class="risk-banner ${riskClass}">
    <div class="risk-level">
      <div class="risk-dot ${riskClass}"></div>
      <div>
        <div class="risk-tag">Overall risk level</div>
        <div class="risk-name ${riskClass}">${r.overall_risk || 'Low'}</div>
      </div>
    </div>
    ${gaugeHtml}
    ${flagsHtml}
  </div>`;

      // Prediction cards
      const predCards = `
  <div class="grid2">
    <div class="pred-card">
      <div class="card-label" style="margin-bottom:10px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Anomaly detection
      </div>
      <span class="pred-badge ${adClass}"><span class="badge-dot"></span>${ad.label || '—'}</span>
      <div class="conf-track"><div class="conf-fill ${adClass}" style="width:${adConf}%"></div></div>
      <div class="conf-pct">${adConf}% confidence</div>
      ${ad.reasoning ? `<div class="pred-reason">${ad.reasoning}</div>` : ''}
    </div>
    <div class="pred-card">
      <div class="card-label" style="margin-bottom:10px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/><path d="m9 12 2 2 4-4"/></svg>
        Cell type
      </div>
      <span class="pred-badge ${ctClass}"><span class="badge-dot"></span>${(ct.primary_type || '—').replace(/_/g, ' ')}</span>
      <div class="conf-track"><div class="conf-fill ${ctClass}" style="width:${ctConf}%"></div></div>
      <div class="conf-pct">${ctConf}% confidence</div>
      ${ct.secondary_types?.length ? `<div class="pred-reason">Also: ${ct.secondary_types.map(t => t.replace(/_/g, ' ')).join(', ')}</div>` : ''}
      ${ct.reasoning ? `<div class="pred-reason">${ct.reasoning}</div>` : ''}
    </div>
  </div>`;

      // Disease card
      const diseaseCard = `
  <div class="disease-card">
    <div class="card-label" style="margin-bottom:10px">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9"/></svg>
      Disease classification
    </div>
    <span class="pred-badge ${diClass}"><span class="badge-dot"></span>${(dc.category || '—').replace(/_/g, ' ')}</span>
    <div class="conf-track"><div class="conf-fill ${diClass}" style="width:${diConf}%"></div></div>
    <div class="conf-pct">${diConf}% confidence</div>
    ${dc.reasoning ? `<div class="pred-reason" style="margin-top:10px">${dc.reasoning}</div>` : ''}
    ${dc.clinical_notes ? `<div class="clinical-note">${dc.clinical_notes}</div>` : ''}
  </div>`;

      // CBC rows
      const cbcRows = Object.entries(CBC_META).map(([k, m]) => {
        const v = ev[k]; if (v == null) return '';
        const f = flag(v, m.nLo, m.nHi);
        return `
    <div class="cbc-row">
      <div class="cbc-top">
        <span class="cbc-name">${m.label}</span>
        <div class="cbc-right">
          <span class="cbc-flag ${f}">${f}</span>
          <span class="cbc-val">${m.fmt(v)}<span class="cbc-unit">${m.unit}</span></span>
        </div>
      </div>
      ${buildRangeBar(v, m.lo, m.hi, m.nLo, m.nHi, m.fmt)}
    </div>`;
      }).filter(Boolean).join('');

      const cbcCard = cbcRows ? `
  <div class="cbc-card">
    <div class="card-label">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2zm0 0V9a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v10m-6 0a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2m0 0V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2z"/></svg>
      CBC values
    </div>
    ${cbcRows}
    <div class="disclaimer">
      Green band = reference range &nbsp;·&nbsp; <span style="color:#22C55E">N</span> normal &nbsp;
      <span style="color:#60A5FA">L</span> low &nbsp; <span style="color:#E84040">H</span> high<br>
      Values extracted by LLM from uploaded document. Not a substitute for certified laboratory analysis.
    </div>
  </div>`: '';;

      // Differential
      const diffEntries = Object.entries(DIFF_META).map(([k, m]) => ({ ...m, val: ev[k] })).filter(e => e.val != null);
      const diffCard = diffEntries.length ? `
  <div class="card">
    <div class="card-label">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
      WBC differential
    </div>
    <div class="diff-bar">
      ${diffEntries.map(e => `<div class="diff-seg" style="flex:${e.val};background:${e.color}"></div>`).join('')}
    </div>
    <div class="diff-grid">
      ${diffEntries.map(e => {
        const off = e.val < e.nLo || e.val > e.nHi;
        const arrow = e.val < e.nLo ? '↓' : e.val > e.nHi ? '↑' : '';
        return `<div class="diff-row">
          <div class="diff-left">
            <div class="diff-swatch" style="background:${e.color}"></div>
            <span class="diff-lbl">${e.label}</span>
          </div>
          <span class="diff-pct ${off ? 'off' : 'ok'}">${e.val.toFixed(1)}%${arrow ? `<span class="diff-arrow">${arrow}</span>` : ''}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`: '';;

      return riskBanner + predCards + diseaseCard + cbcCard + diffCard;
    }

    async function analyze() {
      const key = typeof API_KEY !== 'undefined' ? API_KEY : null;

      if (!key) { showError('API Key missing. Please ensure config.js is set up properly.'); return; }
      if (!fileData) { showError('Please upload a blood report first.'); return; }

      document.getElementById('errorBox').style.display = 'none';
      document.getElementById('results').style.display = 'none';
      document.getElementById('loader').style.display = 'block';
      setStep(2);

      // Format the image for Groq's Vision Model
      const imageContent = fileType.startsWith('image/')
        ? { type: 'image_url', image_url: { url: `data:${fileType};base64,${fileData}` } }
        : { type: 'text', text: '[PDF uploaded — extract all blood values from the text below and analyze.]\n' };

      try {
        const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${key}`
          },
          body: JSON.stringify({
            model: 'meta-llama/llama-4-scout-17b-16e-instruct',
            response_format: { type: "json_object" },
            messages: [
              { role: 'system', content: SYSTEM },
              {
                role: 'user', content: [
                  imageContent,
                  { type: 'text', text: 'Analyze this blood report and return the JSON prediction.' }
                ]
              }
            ]
          })
        });

        const data = await resp.json();
        if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

        const content = data.choices[0].message.content;
        const result = JSON.parse(content);

        document.getElementById('loader').style.display = 'none';
        const el = document.getElementById('results');
        el.innerHTML = buildResults(result);
        el.style.display = 'block';
        setStep(3);

      } catch (err) {
        document.getElementById('loader').style.display = 'none';
        showError('Analysis failed: ' + err.message);
        setStep(1);
      }
    }
  </script>
</body>

</html>
